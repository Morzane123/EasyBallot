# EasyBallot Nginx Configuration
# Domain: tp.xuanjian.top
# Port: 3070
# Server: 115.190.153.44

server {
    listen 80;
    server_name tp.xuanjian.top;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tp.xuanjian.top;

    ssl_certificate     /etc/ssl/tp.xuanjian.top.pem;
    ssl_certificate_key /etc/ssl/tp.xuanjian.top.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:3070;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Client-side caching for static assets
    location /assets/ {
        proxy_pass http://127.0.0.1:3070;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
